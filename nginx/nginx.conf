events {}

http {
    server {
        listen 80;
        server_name webhook.safeguardi.com;

        location /.well-known/acme-challenge/ {
            root C:/nginx/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Drop requests that don't match the domain (direct IP access)
    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate      C:/nginx/ssl/webhook.safeguardi.com-chain.pem;
        ssl_certificate_key  C:/nginx/ssl/webhook.safeguardi.com-key.pem;

        return 444;
    }

    server {
        listen 443 ssl;
        server_name webhook.safeguardi.com;

        ssl_certificate      C:/nginx/ssl/webhook.safeguardi.com-chain.pem;
        ssl_certificate_key  C:/nginx/ssl/webhook.safeguardi.com-key.pem;

        location / {
            proxy_pass http://127.0.0.1:5000;
        }
    }
}
